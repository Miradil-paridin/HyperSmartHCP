services:
  backend:
    build:
      context: ./backend
    container_name: hyperlink-home-backend
    environment:
      APP_NAME: HyperLink Home
      ENVIRONMENT: production
      MOCK_MODE: "true"
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: hyperlink-home-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
